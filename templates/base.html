<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page_description }}">
    <title>{{ profile.name }} | {{ page_title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
</head>
<body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <div class="site-shell">
        <header class="site-header">
            <a class="brand" href="{{ url_for('home') }}" aria-label="Kaleb Coleman home">
                <span class="brand-mark" aria-hidden="true">KC</span>
                <span class="brand-copy">
                    <span class="brand-name">{{ profile.name }}</span>
                    <span class="brand-role">{{ profile.degree }} · {{ profile.graduation }}</span>
                </span>
            </a>

            <nav class="site-nav" aria-label="Primary navigation">
                {% for item in nav_items %}
                <a
                    href="{{ url_for(item.endpoint) }}"
                    class="nav-link {% if active_page == item.endpoint %}is-active{% endif %}"
                    {% if active_page == item.endpoint %}aria-current="page"{% endif %}
                >
                    {{ item.label }}
                </a>
                {% endfor %}
            </nav>

            <a class="resume-link" href="{{ url_for('resume') }}" target="_blank" rel="noopener noreferrer">
                Resume
            </a>
        </header>

        <main id="main-content" class="site-main">
            {% block content %}{% endblock %}
        </main>

        <footer class="site-footer">
            <div>
                <p class="footer-title">{{ profile.name }}</p>
                <p class="footer-text">{{ profile.summary }}</p>
            </div>
            <div class="footer-links">
                <a href="mailto:{{ profile.email }}">{{ profile.email }}</a>
                <a href="{{ profile.linkedin_url }}" target="_blank" rel="noopener noreferrer">LinkedIn</a>
                <a href="{{ profile.github_url }}" target="_blank" rel="noopener noreferrer">GitHub</a>
            </div>
        </footer>
    </div>
</body>
</html>
